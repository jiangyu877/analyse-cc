<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 服务器错误</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0d1117; }
        .error-card { text-align: center; padding: 3rem; }
        .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #ff6b6b, #dc3545); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-desc { color: #888; font-size: 1.1rem; margin: 1rem 0 2rem; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">500</div>
        <h3 class="text-light mt-3">服务器内部错误</h3>
        <p class="error-desc">抱歉，服务器遇到了问题，请稍后重试</p>
        <a href="/" class="btn btn-primary btn-lg"><i class="bi bi-house-door me-2"></i>返回首页</a>
    </div>
</body>
</html>
