{% extends "base.html" %}
{% block title %}消费分析{% endblock %}
{% block content %}
<div class="row mb-4">
    <div class="col">
        <h4><i class="bi bi-pie-chart"></i> 消费分析</h4>
    </div>
</div>
<div class="row mb-3">
    <div class="col">
        <div class="btn-group w-100" role="group">
            <button type="button" class="btn btn-outline-info active view-btn" data-view="trend">
                <i class="bi bi-graph-up"></i> 消费趋势
            </button>
            <button type="button" class="btn btn-outline-info view-btn" data-view="category">
                <i class="bi bi-bar-chart"></i> 分类统计
            </button>
            <button type="button" class="btn btn-outline-info view-btn" data-view="merchant">
                <i class="bi bi-shop"></i> 商户TOP10
            </button>
            <button type="button" class="btn btn-outline-info view-btn" data-view="region">
                <i class="bi bi-geo-alt"></i> 地域统计
            </button>
        </div>
    </div>
</div>
<div class="row">
    <div class="col">
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <canvas id="analysisChart" height="100"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const darkThemeColors = {
    grid: 'rgba(255, 255, 255, 0.1)',
    ticks: 'rgba(255, 255, 255, 0.7)',
    border: 'rgba(255, 255, 255, 0.2)',
    background: 'rgba(13, 110, 253, 0.3)',
    borderColor: 'rgba(13, 110, 253, 0.8)',
    pointBg: 'rgba(13, 110, 253, 0.8)',
    pointBorder: '#fff',
    barColors: [
        'rgba(13, 110, 253, 0.8)',
        'rgba(25, 135, 84, 0.8)',
        'rgba(255, 193, 7, 0.8)',
        'rgba(220, 53, 69, 0.8)',
        'rgba(111, 66, 193, 0.8)',
        'rgba(13, 202, 240, 0.8)',
        'rgba(253, 126, 20, 0.8)',
        'rgba(214, 51, 132, 0.8)',
        'rgba(32, 201, 151, 0.8)',
        'rgba(108, 117, 125, 0.8)'
    ]
};

let chart = null;

function getChartConfig(viewType, labels, values) {
    const isHorizontal = viewType === 'category';
    const datasets = [{
        label: '金额 (元)',
        data: values,
        backgroundColor: isHorizontal
            ? values.map((_, i) => darkThemeColors.barColors[i % darkThemeColors.barColors.length])
            : darkThemeColors.background,
        borderColor: isHorizontal
            ? values.map((_, i) => darkThemeColors.barColors[i % darkThemeColors.barColors.length])
            : darkThemeColors.borderColor,
        borderWidth: 1,
        fill: !isHorizontal,
        tension: 0.3,
        pointBackgroundColor: darkThemeColors.pointBg,
        pointBorderColor: darkThemeColors.pointBorder,
        pointRadius: 4
    }];

    const commonOptions = {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                display: !isHorizontal,
                labels: { color: darkThemeColors.ticks }
            }
        },
        scales: isHorizontal ? {
            x: {
                beginAtZero: true,
                grid: { color: darkThemeColors.grid },
                ticks: { color: darkThemeColors.ticks }
            },
            y: {
                grid: { color: darkThemeColors.grid },
                ticks: { color: darkThemeColors.ticks }
            }
        } : {
            x: {
                grid: { color: darkThemeColors.grid },
                ticks: { color: darkThemeColors.ticks }
            },
            y: {
                beginAtZero: true,
                grid: { color: darkThemeColors.grid },
                ticks: { color: darkThemeColors.ticks }
            }
        }
    };

    const configs = {
        trend: { type: 'line', options: commonOptions },
        category: {
            type: 'bar',
            options: {
                ...commonOptions,
                indexAxis: 'y',
                plugins: {
                    legend: { display: false }
                }
            }
        },
        merchant: {
            type: 'bar',
            options: {
                ...commonOptions,
                plugins: {
                    legend: { display: false }
                }
            }
        },
        region: {
            type: 'bar',
            options: {
                ...commonOptions,
                plugins: {
                    legend: { display: false }
                }
            }
        }
    };

    return { ...configs[viewType], data: { labels, datasets } };
}

async function loadView(viewType) {
    try {
        const response = await fetch('/analysis/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ view_type: viewType })
        });
        const data = await response.json();
        if (!data.success) {
            console.error('Failed to load data');
            return;
        }
        if (chart) {
            chart.destroy();
        }
        const ctx = document.getElementById('analysisChart').getContext('2d');
        const config = getChartConfig(viewType, data.labels, data.values);
        chart = new Chart(ctx, config);
    } catch (err) {
        console.error('Error loading chart data:', err);
    }
}

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', function () {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        loadView(this.dataset.view);
    });
});

document.addEventListener('DOMContentLoaded', function () {
    document.querySelector('.view-btn[data-view="trend"]').click();
});
</script>
{% endblock %}
