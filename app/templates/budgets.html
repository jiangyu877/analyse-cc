{% extends "base.html" %}
{% block title %}预算管理{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h3><i class="bi bi-wallet2 me-2"></i>预算管理</h3>
        <p class="text-secondary mb-0">设定消费预算，实时监控支出情况</p>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">
        <i class="bi bi-plus-circle me-1"></i>新增预算
    </button>
</div>

<!-- Summary Cards -->
<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(0,168,255,0.12); color: var(--accent);">
                <i class="bi bi-wallet2"></i>
            </div>
            <div class="stat-label">本月总预算</div>
            <div class="stat-value" style="color: var(--accent);" id="totalBudget">¥0.00</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(78,205,196,0.12); color: var(--success);">
                <i class="bi bi-cash-coin"></i>
            </div>
            <div class="stat-label">本月已支出</div>
            <div class="stat-value" style="color: var(--success);" id="totalSpent">¥0.00</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card">
            <div class="stat-icon" style="background: rgba(255,217,61,0.12); color: var(--warning);">
                <i class="bi bi-pie-chart"></i>
            </div>
            <div class="stat-label">预算使用率</div>
            <div class="stat-value" style="color: var(--warning);" id="usagePct">0%</div>
        </div>
    </div>
</div>

<!-- Budget List -->
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0"><i class="bi bi-list-check me-2"></i>预算列表</h5>
        <span class="badge bg-info" id="budgetCount">0 项</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>分类</th>
                        <th>月份</th>
                        <th>预算金额</th>
                        <th>已消费</th>
                        <th>剩余</th>
                        <th>使用率</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="budgetTableBody">
                    <tr>
                        <td colspan="7" class="text-center text-secondary py-4">
                            <i class="bi bi-inbox" style="font-size: 2rem; display: block; margin-bottom: 8px;"></i>
                            暂无预算数据，点击"新增预算"开始设置
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>新增预算</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <div class="mb-3">
                        <label class="form-label">消费分类</label>
                        <select id="addCategory" class="form-select" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预算月份</label>
                        <input type="month" id="addMonth" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">预算金额 (¥)</label>
                        <input type="number" id="addAmount" class="form-control" step="0.01" min="0.01" placeholder="0.00" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveBudget()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除此预算吗？</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="doDelete()">删除</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let deleteId = null;

document.addEventListener('DOMContentLoaded', function () {
    loadData();
    // Set default month to current
    const now = new Date();
    document.getElementById('addMonth').value = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
});

async function loadData() {
    try {
        // Load summary
        const summaryRes = await fetch('{{ url_for("budgets.budget_summary") }}');
        const summary = await summaryRes.json();
        if (summary.success) {
            document.getElementById('totalBudget').textContent = '¥' + summary.total_budget.toFixed(2);
            document.getElementById('totalSpent').textContent = '¥' + summary.total_spent.toFixed(2);
            document.getElementById('usagePct').textContent = summary.usage_pct + '%';
        }

        // Load budgets & categories
        const res = await fetch('{{ url_for("budgets.get_budgets") }}');
        const data = await res.json();
        if (!data.success) return;

        // Populate table
        const tbody = document.getElementById('budgetTableBody');
        tbody.innerHTML = '';
        if (!data.budgets || data.budgets.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary py-4">暂无预算数据</td></tr>';
            document.getElementById('budgetCount').textContent = '0 项';
            return;
        }

        document.getElementById('budgetCount').textContent = data.budgets.length + ' 项';
        data.budgets.forEach(b => {
            const budget = parseFloat(b.budget_amount);
            const spent = parseFloat(b.spent_amount);
            const remaining = budget - spent;
            const pct = parseFloat(b.usage_pct);
            const tr = document.createElement('tr');
            const barColor = pct >= 100 ? 'bg-danger' : pct >= 80 ? 'bg-warning' : 'bg-success';
            tr.innerHTML = 
                <td><span style="font-size: 1.2rem;"></span> </td>
                <td></td>
                <td>¥</td>
                <td>¥</td>
                <td style="color: ; font-weight: 600;">¥</td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <div class="progress flex-grow-1" style="height: 8px;">
                            <div class="progress-bar " role="progressbar" style="width: %;"></div>
                        </div>
                        <span class="small">%</span>
                    </div>
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete()">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            ;
            tbody.appendChild(tr);
        });

        // Populate categories dropdown
        const select = document.getElementById('addCategory');
        select.innerHTML = '<option value="">请选择分类</option>';
        if (data.categories) {
            data.categories.forEach(c => {
                select.innerHTML += <option value=""> ()</option>;
            });
        }
    } catch (err) {
        console.error('Load error:', err);
    }
}

function openAddModal() {
    document.getElementById('addCategory').value = '';
    document.getElementById('addAmount').value = '';
    new bootstrap.Modal(document.getElementById('addModal')).show();
}

async function saveBudget() {
    const categoryId = document.getElementById('addCategory').value;
    const amount = document.getElementById('addAmount').value;
    const month = document.getElementById('addMonth').value;

    if (!categoryId || !amount || !month) {
        showToast('请填写完整信息', 'warning');
        return;
    }

    try {
        const res = await fetch('{{ url_for("budgets.add_budget") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                category_id: categoryId,
                budget_amount: amount,
                budget_month: month + '-01'
            })
        });
        const data = await res.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            showToast(data.message, 'success');
            loadData();
        } else {
            showToast(data.message, 'danger');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'danger');
    }
}

function confirmDelete(id) {
    deleteId = id;
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
}

async function doDelete() {
    if (!deleteId) return;
    try {
        const res = await fetch('{{ url_for("budgets.delete_budget") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: deleteId})
        });
        const data = await res.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
            showToast(data.message, 'success');
            loadData();
        } else {
            showToast(data.message, 'danger');
        }
    } catch (err) {
        showToast('请求失败: ' + err.message, 'danger');
    }
    deleteId = null;
}

function showToast(msg, type) {
    const container = document.getElementById('toastContainer') || (function() {
        const c = document.createElement('div');
        c.id = 'toastContainer';
        c.className = 'position-fixed bottom-0 end-0 p-3';
        c.style.zIndex = '9999';
        document.body.appendChild(c);
        return c;
    })();
    const icons = {success: 'bi-check-circle', danger: 'bi-x-circle', warning: 'bi-exclamation-circle'};
    const toastId = 't_' + Date.now();
    const html = <div id="" class="toast align-items-center text-bg- border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body"><i class="bi  me-2"></i></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>;
    container.insertAdjacentHTML('beforeend', html);
    const el = document.getElementById(toastId);
    setTimeout(() => { if (el) { el.classList.remove('show'); setTimeout(() => el.remove(), 300); } }, 3000);
}
</script>
{% endblock %}
