{% extends "base.html" %}
{% block title %}基本查询 - 消费分析系统{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
        <h4><i class="bi bi-search me-2" style="color:var(--primary);"></i>基本查询</h4>
        <p class="text-secondary mb-0">筛选并浏览消费数据记录</p>
    </div>
    <div class="search-box">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="tableSearchInput" placeholder="在结果中搜索..." oninput="filterTable()">
    </div>
</div>

<!-- Filter Card -->
<div class="card mb-4">
    <div class="card-header">
        <i class="bi bi-funnel me-1" style="color:var(--primary);"></i> 筛选条件
    </div>
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label form-label-sm">开始日期</label>
                <input type="date" class="form-control form-control-sm" id="startDate">
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">结束日期</label>
                <input type="date" class="form-control form-control-sm" id="endDate">
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">商户</label>
                <select class="form-select form-select-sm" id="merchantSelect"><option value="">全部</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">消费分类</label>
                <select class="form-select form-select-sm" id="categorySelect"><option value="">全部</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">省份</label>
                <select class="form-select form-select-sm" id="provinceSelect"><option value="">全部</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">支付方式</label>
                <select class="form-select form-select-sm" id="paymentSelect"><option value="">全部</option></select>
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">最小金额</label>
                <input type="number" class="form-control form-control-sm" id="minAmount" placeholder="0.00" step="0.01" min="0">
            </div>
            <div class="col-md-3">
                <label class="form-label form-label-sm">最大金额</label>
                <input type="number" class="form-control form-control-sm" id="maxAmount" placeholder="0.00" step="0.01" min="0">
            </div>
        </div>
        <div class="d-flex gap-2 mt-3 flex-wrap">
            <button type="button" class="btn btn-accent" id="searchBtn"><i class="bi bi-search me-1"></i>查询</button>
            <button type="button" class="btn btn-outline-success" id="exportBtn"><i class="bi bi-download me-1"></i>导出CSV</button>
            <button type="button" class="btn btn-outline-secondary" id="resetBtn"><i class="bi bi-arrow-counterclockwise me-1"></i>重置</button>
        </div>
    </div>
</div>

<!-- Summary Bar -->
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2" id="summaryBar" style="display:none;">
    <div class="d-flex gap-3">
        <span class="text-secondary">共 <strong class="text-primary" id="recordCount">0</strong> 条记录</span>
        <span class="text-secondary">合计金额: <strong class="text-success" id="totalAmount">¥0.00</strong></span>
    </div>
</div>

<!-- Quick Chart Buttons -->
<div class="d-flex gap-2 mb-3 flex-wrap" id="chartBtnGroup">
    <button type="button" class="quick-chart-btn active" data-group="merchant"><i class="bi bi-shop me-1"></i>按商户汇总</button>
    <button type="button" class="quick-chart-btn" data-group="category"><i class="bi bi-tags me-1"></i>按分类汇总</button>
    <button type="button" class="quick-chart-btn" data-group="region"><i class="bi bi-geo-alt me-1"></i>按地域汇总</button>
</div>

<!-- Chart -->
<div class="chart-container mb-4">
    <canvas id="quickChart" height="80"></canvas>
</div>

<!-- Table -->
<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0" id="resultTable">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>金额</th>
                        <th>支付方式</th>
                        <th>商户</th>
                        <th>分类</th>
                        <th>地域</th>
                        <th style="display:none;">备注</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="text-center text-muted py-4"><i class="bi bi-inbox d-block mb-2" style="font-size:1.5rem;"></i>请设置筛选条件后点击查询</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-container" id="tablePagination"></div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-info-circle me-2" style="color:var(--primary);"></i>消费详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="modal-detail-grid" id="detailGrid"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var allRecords = [];
var quickChartInstance = null;
var activeGroupBy = 'merchant';
var currentPage = 1;
var pageSize = 20;

var quickChartColors = [
    'rgba(99,102,241,0.85)', 'rgba(34,197,94,0.85)', 'rgba(245,158,11,0.85)',
    'rgba(239,68,68,0.85)', 'rgba(6,182,212,0.85)', 'rgba(168,85,247,0.85)',
    'rgba(236,72,153,0.85)', 'rgba(34,211,238,0.85)', 'rgba(251,146,60,0.85)',
    'rgba(148,163,184,0.85)'
];

function getFilterData() {
    return {
        start_date: document.getElementById('startDate').value || null,
        end_date: document.getElementById('endDate').value || null,
        merchant_id: document.getElementById('merchantSelect').value || null,
        category_id: document.getElementById('categorySelect').value || null,
        province: document.getElementById('provinceSelect').value || null,
        payment_method: document.getElementById('paymentSelect').value || null,
        min_amount: document.getElementById('minAmount').value || null,
        max_amount: document.getElementById('maxAmount').value || null
    };
}

function formatAmount(val) {
    return '¥' + Number(val).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function updateSummary(count, total) {
    document.getElementById('recordCount').textContent = count;
    document.getElementById('totalAmount').textContent = formatAmount(total);
    document.getElementById('summaryBar').style.display = '';
}

function getPaymentBadge(method) {
    if (!method) return '<span class="badge badge-muted">-</span>';
    var m = method.toLowerCase();
    if (m.includes('微信')) return '<span class="badge badge-success">' + method + '</span>';
    if (m.includes('支付宝')) return '<span class="badge badge-info">' + method + '</span>';
    if (m.includes('银行卡') || m.includes('银联')) return '<span class="badge badge-primary">' + method + '</span>';
    if (m.includes('现金')) return '<span class="badge badge-warning">' + method + '</span>';
    return '<span class="badge badge-muted">' + method + '</span>';
}

function renderPage(page) {
    currentPage = page;
    var start = (page - 1) * pageSize;
    var end = start + pageSize;
    var pageRecords = allRecords.slice(start, end);
    var tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if (!pageRecords.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">无匹配记录</td></tr>';
        return;
    }
    pageRecords.forEach(function(r, idx) {
        var tr = document.createElement('tr');
        tr.setAttribute('data-index', start + idx);
        tr.setAttribute('style', 'cursor:pointer;');
        tr.onclick = function() { openDetailModal(r); };
        tr.innerHTML = '<td>' + (r.spend_date || '') + '</td>' +
            '<td style="color:var(--primary);font-weight:600;">' + formatAmount(r.amount) + '</td>' +
            '<td>' + getPaymentBadge(r.payment_method) + '</td>' +
            '<td>' + (r.merchant_name || '') + '</td>' +
            '<td>' + (r.category_name || '') + '</td>' +
            '<td>' + (r.region || '') + '</td>';
        tbody.appendChild(tr);
    });
    var totalPages = Math.ceil(allRecords.length / pageSize);
    renderPagination('tablePagination', currentPage, totalPages, goToPage);
}

function goToPage(page) {
    renderPage(page);
    document.getElementById('resultTable').scrollIntoView({behavior:'smooth', block:'start'});
}

function filterTable() {
    var q = document.getElementById('tableSearchInput').value.trim().toLowerCase();
    if (!q) { renderPage(1); return; }
    var filtered = allRecords.filter(function(r) {
        return ['spend_date','merchant_name','category_name','region','payment_method','remarks'].some(function(k) {
            return (r[k] || '').toString().toLowerCase().indexOf(q) !== -1;
        });
    });
    var saved = allRecords;
    allRecords = filtered;
    renderPage(1);
    allRecords = saved;
}

function openDetailModal(r) {
    var grid = document.getElementById('detailGrid');
    grid.innerHTML = '';
    var fields = [
        ['日期', r.spend_date || '-'],
        ['金额', formatAmount(r.amount)],
        ['支付方式', r.payment_method || '-'],
        ['商户', r.merchant_name || '-'],
        ['消费分类', r.category_name || '-'],
        ['地域', r.region || '-'],
        ['备注', r.remarks || '-']
    ];
    fields.forEach(function(f) {
        var item = document.createElement('div');
        item.className = 'modal-detail-item';
        item.innerHTML = '<label>' + f[0] + '</label><span>' + f[1] + '</span>';
        grid.appendChild(item);
    });
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

async function loadDropdowns() {
    try {
        var resp = await fetch('/query/dropdowns');
        var data = await resp.json();
        [['merchantSelect', data.merchants, 'merchant_id', 'merchant_name'],
         ['categorySelect', data.categories, 'category_id', 'category_name'],
         ['provinceSelect', data.provinces, null, null],
         ['paymentSelect', data.payment_methods, null, null]
        ].forEach(function(cfg) {
            var sel = document.getElementById(cfg[0]);
            var items = cfg[1];
            var vk = cfg[2]; var tk = cfg[3];
            items.forEach(function(item) {
                var opt = document.createElement('option');
                opt.value = vk ? item[vk] : item;
                opt.textContent = tk ? item[tk] : item;
                sel.appendChild(opt);
            });
        });
    } catch(e) { console.error('加载下拉选项失败:', e); }
}

async function doSearch() {
    try {
        var resp = await fetch('/query/search', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(getFilterData())
        });
        var data = await resp.json();
        if (!data.success) { showToast(data.message || '查询失败', 'warning'); return; }
        allRecords = data.records || [];
        updateSummary(data.count, data.total);
        renderPage(1);
        if (allRecords.length > 0) showToast('查询完成，共 ' + data.count + ' 条记录', 'success');
        else showToast('未找到匹配记录', 'info');
        loadQuickChart(activeGroupBy);
    } catch(e) { showToast('查询失败: ' + e.message, 'danger'); }
}

async function doExport() {
    try {
        showToast('正在导出...', 'info');
        var resp = await fetch('/query/export', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(getFilterData())
        });
        var blob = await resp.blob();
        var url = window.URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '消费记录_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        showToast('导出成功', 'success');
    } catch(e) { showToast('导出失败: ' + e.message, 'danger'); }
}

function doReset() {
    document.querySelectorAll('#startDate,#endDate,#minAmount,#maxAmount').forEach(function(el){el.value='';});
    document.querySelectorAll('#merchantSelect,#categorySelect,#provinceSelect,#paymentSelect').forEach(function(el){el.value='';});
    allRecords = [];
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4"><i class="bi bi-inbox d-block mb-2" style="font-size:1.5rem;"></i>请设置筛选条件后点击查询</td></tr>';
    document.getElementById('summaryBar').style.display = 'none';
    document.getElementById('tablePagination').innerHTML = '';
    document.getElementById('tableSearchInput').value = '';
    if (quickChartInstance) { quickChartInstance.destroy(); quickChartInstance = null; }
}

async function loadQuickChart(groupBy) {
    if (!allRecords.length) return;
    try {
        var resp = await fetch('/query/quick-chart', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({group_by: groupBy})
        });
        var data = await resp.json();
        if (!data.success) return;
        if (quickChartInstance) quickChartInstance.destroy();
        var ctx = document.getElementById('quickChart').getContext('2d');
        quickChartInstance = new Chart(ctx, {
            type:'bar',
            data:{
                labels: data.labels,
                datasets:[{
                    label:'金额 (元)',
                    data: data.values,
                    backgroundColor: data.labels.map(function(_,i){ return quickChartColors[i % quickChartColors.length]; }),
                    borderWidth: 0,
                    borderRadius: 4
                }]
            },
            options:{
                responsive:true, maintainAspectRatio:true,
                plugins:{ legend:{ display:false } },
                scales:{
                    x:{ grid:{ color:'rgba(255,255,255,0.06)' }, ticks:{ color:'var(--text-secondary)', font:{size:11} } },
                    y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,0.06)' }, ticks:{ color:'var(--text-secondary)', font:{size:11}, callback:function(v){return '¥'+v.toFixed(0);} } }
                }
            }
        });
    } catch(e) { console.error('图表加载失败:', e); }
}

document.addEventListener('DOMContentLoaded', function() {
    loadDropdowns();
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('exportBtn').addEventListener('click', doExport);
    document.getElementById('resetBtn').addEventListener('click', doReset);
    document.querySelectorAll('.quick-chart-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.quick-chart-btn').forEach(function(b){ b.classList.remove('active'); });
            this.classList.add('active');
            activeGroupBy = this.dataset.group;
            loadQuickChart(activeGroupBy);
        });
    });
});
</script>
{% endblock %}
