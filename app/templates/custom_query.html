{% extends "base.html" %}{% block title %}只读 SQL 实验{% endblock %}
{% block content %}<div class="page-head"><div><h1>只读 SQL 实验</h1><p>仅管理员可用，服务端强制只读事务、超时与行数限制</p></div></div><section class="panel"><div class="panel-body"><textarea id="sql" class="form-control font-monospace" rows="8">SELECT * FROM ads.customer_value_summary ORDER BY net_amount DESC</textarea><button id="run" class="btn btn-primary mt-3"><i class="ti ti-player-play"></i> 执行查询</button><span id="meta" class="text-muted small ms-2"></span></div><div class="table-responsive"><table class="table"><thead id="head"></thead><tbody id="body"></tbody></table></div></section>{% endblock %}
{% block scripts %}<script>document.getElementById('run').onclick=async()=>{const meta=document.getElementById('meta');meta.textContent='执行中';const res=await fetch('{{ url_for("custom_query.execute_custom") }}',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token() }}'},body:JSON.stringify({sql:document.getElementById('sql').value})});const data=await res.json();if(!data.success){meta.textContent=data.message;return}document.getElementById('head').innerHTML='<tr>'+data.columns.map(c=>`<th>${escapeHtml(c)}</th>`).join('')+'</tr>';document.getElementById('body').innerHTML=data.rows.map(r=>'<tr>'+r.map(v=>`<td>${escapeHtml(v)}</td>`).join('')+'</tr>').join('');meta.textContent=`${data.row_count} 行 · ${data.elapsed_ms} ms${data.truncated?' · 已截断':''}`};function escapeHtml(v){const d=document.createElement('div');d.textContent=v;return d.innerHTML}</script>{% endblock %}
